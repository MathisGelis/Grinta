name: Auto PR sync dev ↔ back/front

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches:
      - dev
    types:
      - closed

jobs:
  create-auto-pr:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up GitHub CLI
        run: |
          gh auth setup-git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR dev -> frontend (if backend merged)
        if: github.event.pull_request.head.ref == 'backend'
        run: |
          gh pr create \
            --base frontend \
            --head dev \
            --title "Merge auto - MàJ de dev" \
            --body "PR automatique suite au merge de backend dans dev."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR dev -> backend (if frontend merged)
        if: github.event.pull_request.head.ref == 'frontend'
        run: |
          gh pr create \
            --base backend \
            --head dev \
            --title "Merge auto - MàJ de dev" \
            --body "PR automatique suite au merge de frontend dans dev."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
